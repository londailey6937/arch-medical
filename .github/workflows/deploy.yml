name: Deploy to CloudFlare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - run: |
          export CLOUDFLARE_API_TOKEN=$(echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | tr -d '[:space:]')
          export CLOUDFLARE_ACCOUNT_ID=$(echo "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" | tr -d '[:space:]')
          npx wrangler pages deploy dist --project-name=arch-medical --branch=master
