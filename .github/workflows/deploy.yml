name: Deploy to CloudFlare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - run: |
          echo "Token length: $(printf '%s' "$CLOUDFLARE_API_TOKEN" | wc -c)"
          echo "Account ID length: $(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | wc -c)"
          echo "Token has newlines: $(printf '%s' "$CLOUDFLARE_API_TOKEN" | grep -c $'\n' || true)"
          CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\n\r\t ')"
          CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | tr -d '\n\r\t ')"
          export CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID
          echo "Trimmed token length: $(printf '%s' "$CLOUDFLARE_API_TOKEN" | wc -c)"
          npx wrangler pages deploy dist --project-name=arch-medical --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
