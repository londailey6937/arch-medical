<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — 510k Bridge</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/assets/style.css" />
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
      }
      .error-code {
        font-size: 6rem;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 12px;
      }
      .error-msg {
        font-size: 1.3rem;
        color: var(--text-muted);
        margin-bottom: 28px;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div>
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p class="error-msg">
          The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="/" class="btn btn-primary">Back to Home</a>
        <a href="/cn.html" class="btn btn-secondary" style="margin-left: 12px"
          >中文首页</a
        >
      </div>
    </div>
  </body>
</html>
